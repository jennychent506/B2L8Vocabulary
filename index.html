    function initAudio() {

    function playSound(type) {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'success') {

        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
        osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
        osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } else if (type === 'failure') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      } else if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      }
    }

    // --- GOOGLE SHEETS DATA DISPATCHER ---
    async function sendDataToGoogleSheet(action, score = 0, level = 1) {
      if (!GOOGLE_SCRIPT_URL) {
        console.log("Sheet URL 未設定，略過後端寫入。");
        return;
      }

      // 取得台灣目前時間戳記
      const taipeiTime = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
      
      const payload = {
        timestamp: taipeiTime,
        className: state.user.class,
        seatNo: state.user.no,
        studentName: state.user.name,
        action: action,
        score: score,
        level: level
      };

      try {
        // 使用 no-cors 模式確保即使 Apps Script 沒有處理 CORS 預檢，封包仍能成功抵達
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        console.log("數據成功拋送至雲端試算表:", action);
      } catch (err) {
        console.error("無法將數據傳送至 Google Sheet:", err);
      }
    }

    // --- SPEECH RECOGNITION SETUP ---
    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        state.speechRecognizer = new SpeechRecognition();
        state.speechRecognizer.continuous = false;
        state.speechRecognizer.lang = 'en-US';
        state.speechRecognizer.interimResults = false;

        state.speechRecognizer.onresult = (event) => {
          const result = event.results[0][0].transcript;
          state.recognizedText = result;
          state.isRecording = false;
          evaluateSpeech();
        };

        state.speechRecognizer.onerror = (event) => {
          console.error("Speech recognition error", event.error);
          state.isRecording = false;
          
          showModal("發音偵測失敗", "無法正常辨識語音。請再讀一次或確認瀏覽器已允許麥克風權限！");
          
          const micBtn = document.getElementById('mic-btn');
          if (micBtn) {
            micBtn.classList.remove('bg-red-400');
            micBtn.classList.add('bg-[#A5E6B4]');
            document.getElementById('mic-btn-text').innerText = '按住或點擊 開始錄音';
          }
        };

        state.speechRecognizer.onend = () => {
          state.isRecording = false;
          const micBtn = document.getElementById('mic-btn');
          if (micBtn) {
            micBtn.classList.remove('bg-red-400');
            micBtn.classList.add('bg-[#A5E6B4]');
            document.getElementById('mic-btn-text').innerText = '按住或點擊 開始錄音';
          }
        };
      }
    }

    async function requestMicrophone() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.micPermission = true;
        stream.getTracks().forEach(track => track.stop());
        setupSpeechRecognition();
      } catch (err) {
        console.warn("Microphone blocked or not supported. Using soft-fallbacks.");
        state.micPermission = false;
      }
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        const voices = window.speechSynthesis.getVoices();
        const usVoice = voices.find(v => v.lang.includes('en-US'));
        if (usVoice) utterance.voice = usVoice;
        window.speechSynthesis.speak(utterance);
      }
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
    }

          ${innerQuizHTML}
        </div>
      `;
    }

    // A. PRO SPEAK VIEW
    function getProSpeakHTML(q) {
      const targetPhrase = q.word;
      return `
        <div class="flex-1 flex flex-col justify-between py-6 items-center text-center">
          <div class="space-y-4 my-auto">
            <div>
              <span class="text-xs font-black bg-black text-white px-3 py-1.5 rounded-full uppercase tracking-wider">${q.pos}</span>
            </div>
            <h2 class="text-5xl font-extrabold text-[#121212] tracking-wide lowercase">${targetPhrase}</h2>
            <p class="text-base font-black text-gray-500">${q.ipa}</p>
            
            <div class="bg-white neo-border rounded-2xl px-5 py-3.5 mx-auto max-w-xs text-center">
              <span class="text-xs font-black text-gray-400 uppercase block mb-1">字義提示</span>
              <p class="text-md font-bold text-gray-800">${q.meaning_zh.split('；')[0]}</p>
            </div>
          </div>

          <div class="w-full space-y-2 mt-8">
            <button id="mic-btn" onclick="toggleMicrophoneRecording('${targetPhrase}')" class="w-full py-5 bg-[#A5E6B4] text-black font-black text-xl neo-border neo-shadow rounded-2xl flex items-center justify-center gap-2.5 neo-button-active transition-all">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
              </svg>
              <span id="mic-btn-text">按住或點擊 開始錄音</span>
            </button>
            <p class="text-xs font-bold text-gray-400">系統會在您停止錄音後直接進行發音精確度評估</p>
          </div>
        </div>
      `;
    }

    // B. SPELL IT VIEW
    function getSpellItHTML(q) {
      setTimeout(() => { speak(q.word); }, 500);

      return `
        <div class="flex-1 flex flex-col justify-center space-y-8">
          <div class="text-center">
            <div class="w-20 h-20 bg-white neo-border neo-shadow rounded-full flex items-center justify-center mx-auto mb-4">
              <button onclick="speak('${q.word}')" class="w-full h-full flex items-center justify-center text-black">
                <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M13.5 22a1 1 0 0 1-1-1v-4.382l-3.382-3.382H5a1 1 0 0 1-1-1v-4.472a1 1 0 0 1 1-1h4.118l3.382-3.382V3a1 1 0 0 1 1.707-.707l6.5 6.5a1 1 0 0 1 0 1.414l-6.5 6.5A1 1 0 0 1 13.5 16V22zm2-14.382v4.764l2.382-2.382L15.5 7.618z"/>
                </svg>
              </button>
            </div>
            <p class="text-sm font-black text-gray-400">點選喇叭可重複聆聽</p>
          </div>

          <div class="bg-gray-50 neo-border rounded-2xl p-4 text-center">
            <span class="text-xs font-black text-gray-400 uppercase">中文提示</span>
            <p class="text-lg font-black text-black mt-1">${q.meaning_zh}</p>
          </div>

          <div>
            <label class="block text-xs font-black text-gray-400 uppercase mb-2">請輸入英文拼寫</label>
            <input id="spell-input" type="text" autocomplete="off" placeholder="在此輸入拼寫..." class="w-full neo-border neo-shadow-sm rounded-2xl p-4 text-center font-black text-xl focus:outline-none focus:ring-2 focus:ring-[#626FE6]">
          </div>

          <button onclick="submitSpellAnswer('${q.word}')" class="w-full py-4 bg-[#626FE6] text-white font-black text-lg neo-border neo-shadow rounded-2xl neo-button-active">
            檢查拼寫
          </button>
        </div>
      `;
    }

    // C. FILL IN VIEW (Redesigned as Text Input / Fill-in-the-blank instead of selection)
    function getFillInHTML(q) {
      // Pick a random example from the question's example set
      const exampleObj = q.examples[Math.floor(Math.random() * q.examples.length)];
      
      // Escape the target word to use in dynamic RegExp matching
      const escapedWord = q.word.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
      const regex = new RegExp(`\\b${escapedWord}\\w*\\b`, 'gi');
      
      // Extract exact word used in sentence (past tense, plural etc.)
      const matches = exampleObj.en.match(regex);
      state.currentFillExact = matches ? matches[0].toLowerCase() : q.word.toLowerCase();
      state.currentFillBase = q.word.toLowerCase();

      // Replace target word in example with blanks
      const blankedSentence = exampleObj.en.replace(regex, "________");

      return `
        <div class="flex-1 flex flex-col justify-center space-y-6">
          <div class="bg-white neo-border rounded-[1.8rem] p-6 text-left relative overflow-hidden">
            <span class="bg-black text-white px-3 py-1 rounded-lg text-xs font-black uppercase tracking-wider block w-max mb-4">搭配詞克漏填空</span>
            
            <p class="text-lg font-black text-black leading-relaxed">
              "${blankedSentence}"
            </p>
            
            <p class="text-sm font-bold text-gray-500 mt-4 border-t-2 border-dashed border-gray-200 pt-3">
              意："${exampleObj.zh}"
            </p>
          </div>

          <div>
            <label class="block text-xs font-black text-gray-400 uppercase mb-2">請輸入適當的英文單字</label>
            <input id="fill-input" type="text" autocomplete="off" placeholder="在此輸入答案..." class="w-full neo-border neo-shadow-sm rounded-2xl p-4 text-center font-black text-xl focus:outline-none focus:ring-2 focus:ring-[#626FE6]">
          </div>

          <button onclick="submitFillAnswerInput()" class="w-full py-4 bg-[#626FE6] text-white font-black text-lg neo-border neo-shadow rounded-2xl neo-button-active">
            檢查答案
          </button>
        </div>
      `;
    }

    // --- VIEW INTERACTION HANDLERS ---

    // Login logic
    async function handleLogin() {
      playSound('click');
      const classVal = document.getElementById('class-input').value.trim();
      const noVal = document.getElementById('no-input').value.trim();
      const nameVal = document.getElementById('name-input').value.trim();

      if (!classVal || !noVal || !nameVal) {
        showModal("提示", "請確實填寫班級、座號與姓名哦！");
        return;
      }

      state.user = {
        class: classVal,
        no: noVal,
        name: nameVal,
        xp: 0,
        level: 1
      };

      // 顯示連線狀態
      const loginBtn = document.getElementById('login-button');
      if (loginBtn) {
        loginBtn.disabled = true;
        loginBtn.innerHTML = `正在與 Google Sheets 連線中... 🚀`;
      }

      await requestMicrophone();

      // 向試算表紀錄：登入事件
      await sendDataToGoogleSheet('登入系統', 0, 1);

      state.currentView = 'dashboard';
      renderApp();
    }

    // Switch LEARN vs COACH tabs
    function switchTab(tabName) {
      playSound('click');
      state.activeTab = tabName;
      renderApp();
    }

    // Word selection
    function selectWord(wordId) {
      playSound('click');
      state.selectedWordId = wordId;
      state.currentView = 'learn_detail';
      renderApp();
    }

    function goBackToDashboard() {
      playSound('click');
      state.currentView = 'dashboard';
      renderApp();
    }

    // Start 15 questions test randomly
    function startQuiz(type) {
      playSound('click');
      state.quizType = type;
      state.quizCurrentIndex = 0;
      state.quizScore = 0;

      state.quizQuestions = [...vocabData]
        .sort(() => 0.5 - Math.random())
        .slice(0, 15);

      state.currentView = 'quiz';
      renderApp();
    }

    function quitQuiz() {
      playSound('click');
      state.currentView = 'dashboard';
      renderApp();
    }

    // --- QUIZ SOLVING AND EVALUATION ---

    function toggleMicrophoneRecording(targetPhrase) {
      playSound('click');
      if (!state.speechRecognizer) {
        showModal("語音功能不支援", "很抱歉，此瀏覽器或當前安全模式不支援語音辨識服務。請確認是否已授予麥克風權限。");
        return;
      }

      const micBtn = document.getElementById('mic-btn');

      if (state.isRecording) {
        state.speechRecognizer.stop();
        state.isRecording = false;
        micBtn.classList.remove('bg-red-400');
        micBtn.classList.add('bg-[#A5E6B4]');
        document.getElementById('mic-btn-text').innerText = '按住或點擊 開始錄音';
      } else {
        state.isRecording = true;
        state.recognizedText = '';
        micBtn.classList.remove('bg-[#A5E6B4]');
        micBtn.classList.add('bg-red-400');
        document.getElementById('mic-btn-text').innerText = '🎙️ 聆聽中... 點此結束並評分';
        state.speechRecognizer.start();
      }
    }

    function evaluateSpeech() {
      const q = state.quizQuestions[state.quizCurrentIndex];
      const target = q.word.trim().toLowerCase();
      const recognized = state.recognizedText.trim().toLowerCase();

      let score = 0;
      if (recognized.includes(target) || target.includes(recognized)) {
        score = 100;
      } else {
        let matches = 0;
        for (let i = 0; i < target.length; i++) {
          if (recognized.includes(target[i])) matches++;
        }
        score = Math.round((matches / target.length) * 100);
      }

      if (score < 20) score = Math.floor(Math.random() * 20) + 30;

      showQuizFeedback(score >= 65, `你朗讀的是: "${state.recognizedText || '...'}"\n發音相似度: ${score}%`);
    }

    // B. Spell Checking
    function submitSpellAnswer(correctWord) {
      playSound('click');
      const spellInput = document.getElementById('spell-input');
      const answer = spellInput.value.trim().toLowerCase();
      const target = correctWord.toLowerCase();

      if (!answer) {
        showModal("提示", "請輸入你的單字拼寫！");
        return;
      }

      const isCorrect = answer === target;
      showQuizFeedback(isCorrect, isCorrect ? `完全正確！你拼寫了: "${correctWord}"` : `拼錯囉！正確拼法是: "${correctWord}"`);
    }

    // C. Fill-In Matching (Text Input Submission Logic)
    function submitFillAnswerInput() {
      playSound('click');
      const fillInput = document.getElementById('fill-input');
      if (!fillInput) return;
      const answer = fillInput.value.trim().toLowerCase();

      if (!answer) {
        showModal("提示", "請輸入你的答案！");
        return;
      }

      // Check answer against either inflected form OR the base word form (intelligent tolerance)
      const isCorrect = (answer === state.currentFillExact) || (answer === state.currentFillBase);
      
      const feedbackText = isCorrect 
        ? `完全正確！答案是: "${state.currentFillExact}"` 
        : `答錯囉！正確答案是: "${state.currentFillExact}"${state.currentFillExact !== state.currentFillBase ? ` (或基本型 "${state.currentFillBase}")` : ''}`;

      showQuizFeedback(isCorrect, feedbackText);
    }

    // SHOW BEAUTIFUL INTERACTIVE FEEDBACK
    function showQuizFeedback(isCorrect, text) {
      if (isCorrect) {
        playSound('success');
        state.quizScore += 10;
        state.user.xp += 10;
        state.user.level = Math.floor(state.user.xp / 100) + 1;
      } else {
        playSound('failure');
      }

      const container = document.getElementById('app');
      
      const overlay = document.createElement('div');
      overlay.className = "absolute inset-0 bg-black/40 flex items-center justify-center p-6 z-40";
      overlay.innerHTML = `
        <div class="bg-white neo-border neo-shadow-lg rounded-[2rem] p-6 w-full text-center space-y-6">
          <div class="w-20 h-20 rounded-full mx-auto flex items-center justify-center neo-border ${isCorrect ? 'bg-[#A5E6B4]' : 'bg-[#F28B82]'}">
            ${isCorrect ? `
              <svg class="w-12 h-12 text-black" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            ` : `
              <svg class="w-12 h-12 text-black" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            `}
          </div>

          <div>
            <h4 class="text-3xl font-black ${isCorrect ? 'text-green-600' : 'text-red-500'}">
              ${isCorrect ? 'SUCCESS!' : 'TRY AGAIN!'}
            </h4>
            <p class="text-sm font-bold text-gray-700 mt-2 whitespace-pre-line">${text}</p>
          </div>

          <button id="next-quiz-btn" class="w-full py-4 bg-black text-white font-black text-lg rounded-2xl neo-button-active">
            ${state.quizCurrentIndex < 14 ? '下一題' : '查看總成績'}
          </button>
        </div>
      `;

      container.appendChild(overlay);

      document.getElementById('next-quiz-btn').focus();
      document.getElementById('next-quiz-btn').onclick = () => {
        playSound('click');
        overlay.remove();
        if (state.quizCurrentIndex < 14) {
          state.quizCurrentIndex++;
          renderApp();
        } else {
          showFinalScoreboard();
        }
      };
    }

    // FINAL SCOREBOARD SUMMARY
    function showFinalScoreboard() {
      playSound('success');
      const container = document.getElementById('app');
      const totalCorrect = state.quizScore / 10;

      // 向試算表即時記錄：完成測驗以及測驗成績、當前等級
      sendDataToGoogleSheet(`完成測驗: ${state.quizType.replace('_', ' ').toUpperCase()}`, state.quizScore, state.user.level);

      container.innerHTML = `
        <div class="h-6 w-full bg-[#5C64F2] neo-border border-t-0 border-l-0 border-r-0"></div>

        <div class="flex-1 flex flex-col justify-center px-8 text-center space-y-8">
          <div class="space-y-2">
            <h2 class="text-4xl font-black italic">CONGRATS!</h2>
            <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">挑戰賽已完成</p>
          </div>

          <div class="bg-[#FBE273] neo-border neo-shadow rounded-[2rem] p-6 space-y-4">
            <p class="text-lg font-black text-black">總分</p>
            <h1 class="text-6xl font-black text-black select-none">${state.quizScore} <span class="text-2xl">XP</span></h1>
            
            <div class="pt-4 border-t-2 border-dashed border-black/30 flex justify-between text-sm font-bold text-black/80">
              <span>正確答對</span>
              <span>${totalCorrect} / 15 題</span>
            </div>
            <div class="flex justify-between text-sm font-bold text-black/80">
              <span>目前等級</span>
              <span>Level ${state.user.level}</span>
            </div>
          </div>

          <button onclick="goBackToDashboard()" class="w-full py-4 bg-[#626FE6] text-white font-black text-lg neo-border neo-shadow rounded-2xl neo-button-active">
            返回大廳
          </button>
        </div>
      `;
    }

    // --- INITIAL RENDER TRIGGER ---
    window.onload = function() {
      renderApp();
    };
  </script>
</body>
</html>
